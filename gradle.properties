# Gradle properties for Claude Code Kotlin port
# Claude Code Kotlin 移植版的 Gradle 属性

# Project info / 项目信息
group=com.anthropic
version=0.1.0-SNAPSHOT

# Kotlin version / Kotlin 版本
kotlin.version=1.9.22

# JVM target / JVM 目标版本
jvm.target=17

# Gradle settings / Gradle 设置
org.gradle.jvmargs=-Xmx2g -XX:+HeapDumpOnOutOfMemoryError
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true

# Kotlin compiler settings / Kotlin 编译器设置
kotlin.code.style=official
kotlin.incremental=true
kotlin.incremental.usePreciseJavaTracking=true

# GraalVM Native Image / GraalVM 原生镜像
graalvm.native.enabled=true
